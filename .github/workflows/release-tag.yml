name: Tag Release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  contents: write

jobs:
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release tag
        id: release
        run: |
          set -euo pipefail

          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            tag_name="$GITHUB_REF_NAME"
          else
            tag_name="v$(node -p "require('./package.json').version")"

            if ! git ls-remote --exit-code --tags origin "$tag_name" >/dev/null 2>&1; then
              echo "Tag $tag_name does not exist yet. Skipping release sync."
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

      - name: Create or promote GitHub release
        if: steps.release.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          set -euo pipefail

          if ! gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create \
              "$TAG_NAME" \
              "--repo" "$GITHUB_REPOSITORY" \
              "--verify-tag" \
              "--title" "$TAG_NAME" \
              "--generate-notes"
          fi

          release_id="$(
            gh api \
              "repos/$GITHUB_REPOSITORY/releases/tags/$TAG_NAME" \
              --jq ".id"
          )"

          gh api \
            --method PATCH \
            "repos/$GITHUB_REPOSITORY/releases/$release_id" \
            -f "name=$TAG_NAME" \
            -F "draft=false" \
            -F "prerelease=false" \
            -F "make_latest=true"
